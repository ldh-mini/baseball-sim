name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'kbo-simulation.jsx'
      - 'src/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'tailwind.config.js'
      - 'postcss.config.js'
      - '.github/workflows/deploy-pages.yml'
      # 정적 데이터: daily-predict가 commit하면 재배포
      - 'schedule-today.json'
      - 'team-stats.json'
      - 'prediction-log.json'
      - 'recent-stats.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Stage static data into public/data
        run: |
          mkdir -p public/data
          for f in schedule-today.json team-stats.json prediction-log.json recent-stats.json; do
            if [ -f "$f" ]; then
              cp "$f" "public/data/$f"
              echo "  copied: $f"
            fi
          done

      - name: Build
        env:
          GITHUB_PAGES: 'true'
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
